<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="phoneCalc.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="calculator">
      <input type="text" id="inputText" value="0" />
      <div class="calculator-btns">
        <button id="clearBtn">C</button>
        <button id="deleteBtn">
          <i class="fa-solid fa-delete-left"></i>
        </button>
        <button class="operatorBtn" id="percentage">%</button>
        <button class="operatorBtn" id="division">
          <i class="fas fa-divide"></i>
        </button>
        <button class="inputNumberBtn">7</button>
        <button class="inputNumberBtn">8</button>
        <button class="inputNumberBtn">9</button>
        <button class="operatorBtn">*</button>
        <button class="inputNumberBtn">4</button>
        <button class="inputNumberBtn">5</button>
        <button class="inputNumberBtn">6</button>
        <button class="operatorBtn">-</button>
        <button class="inputNumberBtn">1</button>
        <button class="inputNumberBtn">2</button>
        <button class="inputNumberBtn">3</button>
        <button class="operatorBtn">+</button>
        <button>()</button>
        <button class="inputNumberBtn">0</button>
        <button class="operatorBtn">.</button>
        <button id="equalBtn">=</button>
      </div>
    </div>
  </body>
  <!-- <script src="phoneCalc.js"></script> -->

  <script src="sample.js"></script>
</html>
