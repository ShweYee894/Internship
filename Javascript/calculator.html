  <body>
    <div class="container">
      <h2>Mini Calculator</h2>
      <div class="input-content">
        <input type="number" id="firstNumber" placeholder="Number1" />
        <select name="operator" id="operator" style="width: 50px">
          <option value="add">+</option>
          <option value="sub">-</option>
          <option value="multiply">*</option>
          <option value="division">/</option>
          <option value="remainder">%</option>
          <option value="exponent">**</option>
        </select>
        <input type="number" id="secondNumber" placeholder="Number2" />
      </div>
      <button id="demoBtn">Calculate Amount</button>
      <div class="result">
        <p>Result: <span id="resultValue">----</span></p>
      </div>
    </div>
  </body>

  <script>
    const btn = document.getElementById("demoBtn");
    const number1 = document.getElementById("firstNumber");
    const number2 = document.getElementById("secondNumber");
    const operator = document.getElementById("operator");
    const result = document.getElementById("resultValue");

    function calcFunction() {
      const num1 = parseFloat(number1.value);
      const num2 = parseFloat(number2.value);
      const oper = operator.value;

      if (isNaN(num1) || isNaN(num2)) {
        result.textContent = "Error : Missing Numbers!";
        return;
      }
    }
