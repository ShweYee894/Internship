<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="icon" type="image/png" href="woman.png" />
    <link
      href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      class="bg-blue-300 w-1/5 mx-auto h-70 flex flex-col items-center p-5 rounded-lg gap-5 mt-10"
    >
      <div class="flex justify-center">
        <img class="w-20" src="woman.png" alt="Profile Image" />
      </div>

      <div class="text-center">
        <p class="text-xl font-bold text-white">Jane Developer</p>
        <p class="text-sm">Full Stack Engineer</p>
      </div>

      <div class="flex justify-between text-md gap-4">
        <p class="bg-green-300 rounded-lg px-2">React</p>
        <p class="bg-red-300 rounded-lg px-2">Tailwind</p>
        <p class="bg-pink-300 rounded-lg px-2">Node.js</p>
      </div>

      <button class="bg-blue-500 text-white rounded-md w-60">Follow</button>
    </div>
  </body>
</html>
