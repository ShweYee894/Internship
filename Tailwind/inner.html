  <body class="bg-gray-200">
    <div class="flex w-[800px] bg-white m-auto mt-10 p-8 rounded-lg gap-10">
      <section class="flex flex-col gap-4 p-5 bg-white w-[400px]">
        <h2 class="text-xl font-bold">Update Variables</h2>

        <label for="name">Name(String):</label>
        <input
          class="border rounded p-2 text-gray-600"
          type="text"
          id="name"
          title="name"
          value="Amenda"
          oninput="myFunction()"
        />

        <label for="age">Age(Number):</label>
        <input
          class="border rounded p-2 text-gray-600"
          type="number"
          id="age"
          title="age"
          value="24"
          min="1"
          oninput="myFunction()"
        />

        <label for="status">VIP Status(Boolean):</label>
        <input
          type="checkbox"
          id="status"
          title="status"
          checked
          oninput="myFunction()"
        />
        <!-- add 'checked' keyword to know if the user is click the checkbox -->

        <label for="cardColor">Card Color:</label>
        <input
          class="border rounded p-2 text-gray-600"
          type="color"
          id="cardColor"
          title="cardColor"
          value="whitesmoke"
          oninput="myFunction()"
        />
      </section>

      <section class="flex flex-col p-5 w-[400px] gap-8">
        <h2 class="text-xl font-bold">Live DOM Output</h2>
        <div
          class="bg-white p-5 rounded-lg border border-gray-500 gap-4 flex flex-col"
          id="outputCard"
        >
          <p
            id="vipStatus"
            class="w-[120px] px-4 py-2 rounded-3xl text-xs font-bold"
          ></p>
          <p><span id="inputName" class="text-2xl font-bold"></span></p>
          <p>Age : <span id="inputAge"></span></p>
          <script>
            function myFunction() {
              let name = document.getElementById("name").value;
              let age = document.getElementById("age").value;
              let status;
              let cardColor = document.getElementById("cardColor").value;

              if ((status = document.getElementById("status").checked)) {
                document.getElementById("vipStatus").innerHTML = "VIP Member";
                document
                  .getElementById("vipStatus")
                  .classList.add("bg-yellow-400");
              } else {
                document.getElementById("vipStatus").innerHTML = "";
                document
                  .getElementById("vipStatus")
                  .classList.remove("bg-yellow-400");
              }
              document.getElementById("inputName").innerHTML = name;
              document.getElementById("inputAge").innerHTML = age;
              document.getElementById("outputCard").style.backgroundColor =
                cardColor;
            }

            addEventListener("DOMContentLoaded", myFunction);
          </script>
        </div>
      </section>
    </div>
  </body>
